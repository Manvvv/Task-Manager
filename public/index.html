<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TASKR — Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- ── HEADER ── -->
  <header>
    <div>
      <div class="logo">TASK<span>R</span></div>
      <div class="logo-sub">PRODUCTIVITY COMMAND CENTER</div>
    </div>
    <div class="header-meta">
      <strong id="stat-total">0</strong><br>
      TOTAL TASKS<br>
      <span id="today-date"></span>
    </div>
  </header>

  <!-- ── STATS BAR ── -->
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-num" id="s-active">0</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat blue">
      <div class="stat-num" id="s-completed">0</div>
      <div class="stat-label">Completed</div>
    </div>
    <div class="stat warn">
      <div class="stat-num" id="s-medium">0</div>
      <div class="stat-label">Medium Priority</div>
    </div>
    <div class="stat danger">
      <div class="stat-num" id="s-high">0</div>
      <div class="stat-label">High Priority</div>
    </div>
  </div>

  <!-- ── ADD TASK FORM ── -->
  <div class="input-section">
    <h2>// New Task</h2>
    <div class="input-row">
      <input type="text" class="input-main" id="task-input" placeholder="Task title..." maxlength="120">
      <select id="priority-select">
        <option value="low">LOW</option>
        <option value="medium" selected>MEDIUM</option>
        <option value="high">HIGH</option>
      </select>
      <select id="cat-select">
        <option value="general">GENERAL</option>
        <option value="work">WORK</option>
        <option value="personal">PERSONAL</option>
        <option value="study">STUDY</option>
        <option value="health">HEALTH</option>
      </select>
    </div>
    <div class="input-row">
      <textarea class="input-main" id="desc-input" placeholder="Description (optional)..." rows="2"></textarea>
    </div>
    <div class="input-row">
      <button class="btn btn-primary" id="add-btn">+ ADD TASK</button>
      <button class="btn btn-ghost" id="clear-form-btn">CLEAR</button>
    </div>
  </div>

  <!-- ── FILTERS ── -->
  <div class="filters">
    <span class="filter-label">FILTER:</span>
    <button class="filter-btn active" data-filter="all">ALL</button>
    <button class="filter-btn" data-filter="active">ACTIVE</button>
    <button class="filter-btn" data-filter="completed">DONE</button>
    <div class="filter-sep"></div>
    <button class="filter-btn" data-filter="high">HIGH</button>
    <button class="filter-btn" data-filter="medium">MEDIUM</button>
    <button class="filter-btn" data-filter="low">LOW</button>
    <div class="filter-sep"></div>
    <input type="text" class="search-input" id="search-input" placeholder="Search tasks...">
  </div>

  <!-- ── TASK LIST ── -->
  <div class="task-list-header">
    <h2>// TASKS</h2>
    <button class="clear-btn" id="clear-completed">CLEAR COMPLETED</button>
  </div>

  <ul id="task-list"></ul>

  <div class="empty-state" id="empty-state">
    <div class="empty-icon">◻</div>
    <p>NO TASKS FOUND.<br>ADD ONE ABOVE OR CHANGE YOUR FILTER.</p>
  </div>

</div>

<!-- ── TOAST NOTIFICATION ── -->
<div id="toast">TASK ADDED</div>

<script src="app.js"></script>
</body>
</html>
